
services:
  incident-reasoner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incident-reasoner
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
